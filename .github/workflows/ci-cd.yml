name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t devops-app .

      - name: Run Tests
        run: echo "Tests passed"

      - name: Push Image
        run: echo "Simulating DockerHub push"